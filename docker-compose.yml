services:
  notification-service:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: nn-notification-service
    ports:
      - '5070:5070'
    env_file:
      - .env
    networks:
      - nn-backend-network
      - nn-shared-network
    restart: unless-stopped

networks:
  nn-backend-network:
    external: true
  nn-shared-network:
    external: true
